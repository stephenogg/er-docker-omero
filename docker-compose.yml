services:

  database:
    image: "postgres:16"
    environment:
      POSTGRES_USER: omero
      POSTGRES_DB: omero
      POSTGRES_PASSWORD: omero
      POSTGRES_HOST_AUTH_METHOD: trust
    networks:
      - omero
    volumes:
      - "database:/var/lib/postgresql/data"

  omeroserver:
    # This container uses the tag for the latest server release of OMERO 5
    # To upgrade to the next major release, increment the major version number
    #Build the image from a dockerfile that includes copying hte Figure_To_PDF.py file from omero-figure
    #to the server scripts directory. 
    #image: "openmicroscopy/omero-server:5"
    build: omero-server
    environment:
      CONFIG_omero_db_host: database
      CONFIG_omero_db_user: omero
      CONFIG_omero_db_pass: omero
      CONFIG_omero_db_name: omero
      ROOTPASS: omero
    networks:
      - omero
    ports:
      - "4063:4063"
      - "4064:4064"
    volumes:
      - "omero:/OMERO"
      - "logs:/opt/omero/server/OMERO.server/var"
    ulimits:
      nofile:
        soft: 8192
        hard: 65536

  omeroweb:
    # This container uses the tag for the latest web release of OMERO 5
    # To upgrade to the next major release, increment the major version number
    image: "openmicroscopy/omero-web-standalone:5"
    environment:
      OMEROHOST: omeroserver
      CONFIG_omero_web_login__logo: http://www.kcl.ac.uk/SiteElements/Images/KCLlogo130.gif
      #CONFIG_omero_web_login__logo: https://www.kcl.ac.uk/SiteElements/2017/images/kcl-logo.svg
      #CONFIG_omero_web_top__logo__link: https://devneuro.org
      #CONFIG_omero_web_top__logo: https://devneuro.org/cdn/content/images/CDNlogo/Logo-CDN-Color-80h-c-notext.png
    networks:
      - omero
    ports:
      - "4080:4080"

networks:
  omero:

volumes:
  database:
  omero:
    external: true
  logs:
    external: true
